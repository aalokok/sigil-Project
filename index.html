<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cybersigil Growth – Branching Animation</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="background-container"></div>
  
  <!-- Hide/Show UI Button -->
  <button id="ui-toggle">☰</button>
  <button id="immersive-toggle" title="Immersive Mode (F)">⛶</button>
  
  <!-- Unified Control Panel -->
  <div id="control-panel">
    <div class="panel-section" id="shortcuts-section">
      <div class="shortcut-item"><span class="key">SPACE</span> Add branch</div>
      <div class="shortcut-item"><span class="key">R</span> Reset</div>
      <div class="shortcut-item"><span class="key">F</span> Immersive</div>
      <div class="shortcut-item"><span class="key">DRAG</span> Orbit</div>
    </div>
    
    <div class="panel-section">
      <div class="section-title">Mirror</div>
      <div class="button-row">
        <button id="mirrorXBtn">X</button>
        <button id="mirrorYBtn">Y</button>
        <button id="mirrorZBtn">Z</button>
        <button id="invertColorsBtn">Invert</button>
      </div>
    </div>
    
    <div class="panel-section">
      <div class="section-title">Audio</div>
      <button id="micToggle">🎤 Mic</button>
      <input type="file" id="audioUpload" accept="audio/mpeg" placeholder="Upload MP3">
      <audio id="audioPlayer" controls loop></audio>
    </div>
    
    <div class="panel-section">
      <div class="section-title">Effects</div>
      <div class="control-group">
        <label for="micGain">Mic Gain</label>
        <input type="range" id="micGain" min="0.1" max="10.0" step="0.1" value="1.0">
      </div>
      <div class="control-group">
        <label for="noiseAmount">Noise</label>
        <input type="range" id="noiseAmount" min="0" max="0.2" step="0.001" value="0.03">
      </div>
      <div class="control-group">
        <label for="bloomStrength">Bloom</label>
        <input type="range" id="bloomStrength" min="0" max="3" step="0.1" value="1.5">
      </div>
      <div class="control-group">
        <label for="bloomRadius">B.Radius</label>
        <input type="range" id="bloomRadius" min="0" max="1" step="0.01" value="0.4">
      </div>
      <div class="control-group">
        <label for="bloomThreshold">B.Thresh</label>
        <input type="range" id="bloomThreshold" min="0" max="1" step="0.01" value="0.85">
      </div>
      <div class="control-group">
        <label for="thresholdStrength">Threshold</label>
        <input type="range" id="thresholdStrength" min="0" max="1" step="0.01" value="0.5">
      </div>
      <div class="control-group">
        <label for="inverseThreshold">Inverse</label>
        <input type="checkbox" id="inverseThreshold" checked>
      </div>
      <div class="control-group">
        <label for="imageUpload">Image</label>
        <input type="file" id="imageUpload" accept="image/png, image/jpeg">
      </div>
    </div>
  </div>
  
  <script type="module" src="main.js"></script>
</body>
</html>
